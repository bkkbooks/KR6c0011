body:
  text: 南吳月支國居士支謙譯行品第一聞如是一時佛遊於王舍國其雞山與大比丘衆不可計弟子善業第一及大衆菩薩無央數敬首為上首是時十五齊日月滿佛請賢者善業此衆菩薩集會樂汝說菩薩大士明度無極欲行大道當由此始師云請之以法不以飲食也於是秋露子念此賢者說明度道自己力所乘佛聖恩乎善業知其意而答曰敢佛弟子所說皆乘如來大士之作所以者何從佛說法故有法學賢者子賢者女得法意以為證法學學法也解空不願無想寂定謂之得法意漏盡結解得道謂之證由言證已當還本無矣其為證者所說所誨所言一切如法無諍所說者解說經義也所誨者教誨人也言者廣陳法言也所以者何如來說法為斯樂者族姓子傳相教如經意無所諍如如人本也來所由來也人本空無泥曰同躰也佛得三法空三界願想滅矣安般曰還為何等還五陰知見滅處故曰如來矣佛說淨法但為樂斯本無寂法法施也善業言如世尊教樂說菩薩明度無極欲行大道當由此始夫體道為菩薩是空虛也斯道為菩薩亦空虛也師云菩薩心履踐大道欲為體道心為道俱無形故言空虛也斯道者謂空不願無想也何等法貌為菩薩者不見佛法有法為菩薩也於佛經法不見五陰六衰十二緣起有菩薩也吾於斯道無見無得其如菩薩不可見明度無極亦不可見彼不可見何有菩薩當說明度無極若如是說菩薩意志不移不捨不驚不怛不以恐受不疲不息不惡難此微妙明度與之相應而以發行則是可謂隨教者也不移不退轉也不捨不廢大志也驚怪怛熱也不驚怪必深法心中不滿熱嫌其為苦也必歡喜受此法不以恐迫故受此法強學之也以不為疲不以為勞也不息者不懈也又菩薩大士行明度無極當學受此如受此者不當念是我知道意所以者何是意非意淨意光明賢者秋露子曰云何有是意而意非意善業曰若非意者為有為無師云當學知是非意以知非意無復想捨即為意淨光明者無復塵冥矣也彼可得耶彼彼意也可得意處不乎曰不可也言不可者不可言無亦不可得處也善業曰如非意有與無不可得不可得不可明其合此相應者豈有是意意非意哉曰如是者何謂非意善業曰謂其無為有為者謂生死之心陰自起念捨一念一至無不為己非意者無復有此生死想故曰無也無雜念也雜念者想且在經且在五陰意不一定謂之雜念也已如空定不起五陰為無雜念也秋露子曰善哉善哉佛稱賢者說山澤行實為第一菩薩受此無上正真之道善業意解微妙常善於山澤空淨之行故為佛所稱不退轉菩薩受此意不轉謂菩薩得住第七地也觀而不休明度無極當以知此觀而不休謂惟此經意不疲倦也欲學弟子地當聞是經擇取奉持弟子趣欲空不願無想得泥洹已不望知佛權道大悲也欲學緣一覺地緣一覺者望欲得佛慈悲不著不密於善權也若學佛地當聞是經學佛地者弘慈普濟不中道取證矣擇取奉持所以者何是明度道說法甚廣是為菩薩大士所學善權十力無畏佛法度人欲一切知言是經廣大在三學者自擇取也善業白佛言吾以為菩薩者其不可見名亦不可得師云菩薩與名皆空當以何為之說明度經也又所匡政皆不可見不可得者當何為菩薩說法欲以道匡政天下著欲之徒使其無為邪見之行也如是世尊所疑有著吾與物也斯不可得一切所疑謂有吾身與萬物也資貨費耗皆非有得吾與萬物皆非已有難可常保也但以名為菩薩至于佛亦名也然不住不住佛與菩薩在世間但名耳其法意非住也不住者以權著也所以者何名不可得是故名者非住非不住名者猶水中月像也若為菩薩說深明度意不移不捨不疲不息不有惡難不驚不怛不以恐受以體解而性入性與道俱如合符契也是為住不退轉應於無處當以知此又妙世尊師云妙者此經義甚深妙也菩薩修行明度無極不以色住不倚此色身住也於痛想行不以識住不以名身住也所以者何若止於色為造色行是為甫始主作生無身業也止痛想行為造識斯又甫欲與造邪識之行始衆生矣非為應受非如法受也明度無極不造行為應受識不造色行是為應受明度矣受此其不具足明度無極終不得一切知於斯經中有邪想行如毛髮謂之不具終不得作佛也秋露子曰菩薩何行而受明度善業曰以不取色取著也不著於色也不取痛想行識所以者何色無彼受痛想行識無有彼受若此色無彼受為非色痛想行識無有彼受為非識明度之道無有彼受所以者何吾受如取影無所得是為明度無極之行也是名曰菩薩大士諸法無受之定我於世間所受如夢如影影為無所得也場廣趣大而無有量一切弟子諸緣一覺所不能持也教順之場極廣所趣之道極大四等弘普周遍無極畢央濟衆苦痛難忍甘心進擢志大不權弟子若佛所不能究竟曰不能持矣又一切知亦無彼受師云一切知佛也唯佛得無不知所以者何無想見故若想見者終不得此為若異學先泥之信不得一切知彼先泥信解道學度入慧亦不取色不取痛想行識不從色見慧不內色見慧不外色見慧不內外色見慧不以異色見慧於痛想行如上說不從識不以內外異識見慧如是究暢從信解得道地法意作量以為脫便無受無獲無受不復受五盛陰想無獲無復罪福故言無所獲矣已受解得度滅已受解者謂八正道及正解正智為意已受無復思想為已得應義也明度不為智想如是世尊雖菩薩於是道不取色痛想行識亦不中道滅度而具如來十力四無所畏佛十八不絶之法也菩薩得明度意見空甫修佛事以其力無畏十八法成相好嚴佛剎不違本願欲度十方不中道滅度也又菩薩大士行明度無極當以觀此何等是智慧何所為明度何以明諸法無所從得師云不從內色外色內外痛想行見惠是為無所從得也是故謂之明度無極如是觀省察思惟不驚不怛不移不疲如是菩薩為不中休明度無極以知此秋露子曰何故菩薩知己休止為如於色休色本性於痛想行休識本性明度無極休識本性色之本性著復著起復起五陰悉爾菩薩於五陰休其本性不著起也明度無極休智本性善業曰如是賢者其於色也休色自然菩薩學明度本心欲分別知望得惠當休是欲知望之想無所復起也於痛想行休識自然明度無極休識自然明度無極休智自然行此道者於智休止智之自然者休矣於五陰中皆休其自起不復起矣相休止相之自然者休矣秋露子曰善哉善哉其學此者必出一切智行此道者休其欲之心即知心自起者皆休止也善業曰然菩薩學此出一切知所以者何其於諸法無出無生如是學故逮得佛坐學如此者必從生死之出成佛一切知矣又妙賢者菩薩履行明度無極若行色為想行若行色占為想行若行色不占為想行若行色興為想行若行色敗為想行若行色滅為想行若行色思為想行若行色空為想行若行色非身為想行痛想行識如上說皆為想行若識有是吾當行欲得行設有是如是行如是惟為惟行師云說色如此痛想行識亦如色說也此道為是菩薩大士為行得想之行無善權方便以為休於明度無極此上章皆為三界生死不合明度大智之道也秋露子曰菩薩何行為無想無得行有善權方便而不休於明度無極答曰不行色不行色占不行色興不行色敗不行色滅不行色想不行色空不行色非身痛想行識如上說不有是師云不以有識知有此想也吾當得行是行不有是此行惟為行此道如是行菩薩大士為無想無得行為有善權方便而不休於明度無極不以識知有此相應於明度無極也右此章所說無想無得之行也又菩薩大士行明度無極於此不近為不行不近行師云菩薩於此五陰念無所依近為不行者謂無所行也不行不近菩薩意不近行亦不行不近以為真亦不行亦不行如此也斯不否行斯不近行斯不近不行斯亦不近於行不行於不近於不行不否行於不近如此上謂意上事亦不離此上意矣秋露子曰何故不近善業曰如諸法無所近無從度是名菩薩大士不著行亦不斷行者為生死斷為泥洹能護此兩意是名為特曉明度善權也一切諸法無度之定如十二因緣皆空如無想可近者不著不縛故無得道也場曠趍大而無有量一切弟子諸緣一覺所不能持行斯定者疾得無上正真之道為無不覺乘佛聖旨善業曰是菩薩大士受拜於往昔如來至真等正佛者乃行斯定彼受無見無見為定其於定者不知吾受之師云菩薩於定不作思想也吾已定吾依定也彼於是中一切不明不以意分明之也秋露子曰云何菩薩為昔如來所說拜當得佛者彼能見定是定者乎彼謂以得拜家寧能自見意定為以定耶答曰不也所以者何如彼族姓子學此經人為善男子是也行明度無極者為非不想所以者何無所明故無所別知故也是以定者非想非想非五陰想也非不想有三十七品三活想無世俗想也佛言善哉善哉善業說山澤行為第一辨菩薩大士當以學此如此為學明度無極辨智之決者問來即答事皆明真矣秋露子曰佛以如此學學智慧道者是為學何法佛言如此學者是菩薩為無所法學何以故是法不有知明如凡愚人專著者也師云知之明之即為專著也曰當何用明知此法為學者問欲得佛者何用明知此佛言當如不明無所明知明之謂也無所明定是為定也凡愚人以專著者欲明故為不明由不明礙兩際不出生死不解清淨是為兩際也不知不見不明諦法諦四諦矣意著二際不知欲苦不見習證不明有盡不達淨道故曰不明也而欲於法不獲無想定故想欲想得之了本曰行福福識生夫欲於道而不獲定者世世受福得佛之望耶從法思欲專著名色以專著故而不知此無所用聰明之法已不知見亦不思惟不觀不省故墮愚數便無有信不解不用是故謂之凡愚專著從法法心法也痛想行識謂之名地水火風謂之色從欲之徒專著五陰心馳三界佪流生死不能拔邪穢之根法句曰心為法本禍福由心行殃殃罪罪識生五陰所弊故不睹無念法也無念法也無所由聰明之法者獲無想之定善惡不同十二因緣滅諸根都寂厭生死神還休人本純真經曰心入泥洹從本寂又寂不解四非常守意志著空斯空想天之類矣由還生死受苦無數慧印經曰如令泥洹為常住法大哀四等還為蠕動謂其不能空空入泥洹處本寂者也秋露子曰計如此學菩薩大士不學一切智不起想求衆智矣佛言然如此學不學一切智如是曉了乃為學一切智曉了者謂不著不斷不起不滅耶能出一切法謂十二部經法善業白言如世尊言是為幻人學一切智已學一切智乃出諸法如直言之當云何佛言吾因是以問汝所安便說師言所安便說如言旦說汝所知也對曰甚善佛言云何幻與色異乎不也世尊幻與痛想行識為有異乎不也世尊云何知想在此經者及行同此法者意處是經者盛陰已滅者持生死五陰成菩薩道者皆云何也色猶幻痛想行識猶為幻云何善業明是中想知立行五陰而為菩薩對曰菩薩學如幻人是中持如幻者即五陰所以者何如佛說識如幻善業說往者所聞佛語引以喻義也若此識六根亦然何者意幻為三界耳如三界即六根即五陰秋露子言菩薩聞是得無懈怠佛言設為惡友所制必持懈怠若得善友終不懈也若識如幻者六根亦復如幻意所幻化令有三界耳善業白佛何以知菩薩惡友佛言其不慕樂明度無極欲棄捨若形相愚占文飾違此深智師云愚者已想取文飾占者想取也更說經道當知是為菩薩惡友善人好明度而違退之更為說異道經是為惡友也曰何是善友佛言未起明度無極者即勸使學教誨之令入斯道為現邪行說邪之害是邪行是邪害使遠離此當知是為菩薩大士弘誓之鎧善友者也弘誓者菩薩自誓忍世衆苦必於得佛極濟衆生滅十二因緣還乎本無鎧者德其行高見罪常由壯士以鎧障身全命勢成勝敵終始無畏菩薩內淨視明以八直之行與邪意戰破壞五賊高願取佛不能沮遂成世尊故曰法鎧也又問呼道人為菩薩其句義為奈何佛言所謂菩薩者一切諸法學無罣礙已學無礙能出諸法故謂菩薩大士者其義云何佛言大士者能聚大衆為之合家是故為大士也菩薩能於三界為大尊貴若金輪王合聚大衆化之以德身棄國位為沙門導之以大道示衆欲惡故曰大士秋露子曰吾亦樂其為大士者於見身見性見命見人見丈夫見有見無見斷滅見常在為斷大見何者為說上師云六十二見為一見潤耳法度諸見潤是故為大士法佛法以佛法度六十二見及欲癡之四潤故曰度也善業曰夫大士者如一切知意無齊同志於弟子緣一覺如佛意不與弟子各佛齊同也在彼無著所以者何悉知意質直無漏在彼者在生死也無受無滅無受者不受五陰也無滅者不捨生死求滅之想也以悉知意大照菩薩是故為大士能持明度教照菩薩也秋露子曰問何故菩薩大士亦彼悉知而意不著善業曰以無意故於彼悉知而無所著賢者滿慈子言吾亦樂其為大士者揖人升於大乘而有弘誓之鎧是為大士師云能以經法揖天人使升佛大乘之道也善業白佛何謂弘誓之鎧佛言菩薩束已自誓吾當滅度無央數人已度無量無數人民皆得泥洹知其無法得滅度也所以者何意法如是譬如幻師與幻弟子於四衢道化作人衆以為化人而斬其首汝知云何彼有所殺有死者乎不也世尊如是善業度無數人為無有人得滅度也菩薩聞是不驚不怛不以恐受不移不捨不疲而無慘悴是為有弘誓鎧能升大乘當以知此滿慈子曰吾省佛言如我所得當知是義為無帶甲所以者何如佛告善業無造佛一切法無作成諸法者亦無造衆生者如是義者無弘誓鎧善業曰無所束帶菩薩大士為無弘誓所以者何色痛想行識不著不縛不解故秋露子曰何如為色痛想行識而云不著不縛不解善業曰色如幻人故不著不縛不解痛想行識為如幻人不著不縛不解無有之色不著不縛不解無有之痛想行識不著不縛不解五陰如是諸法亦然是故菩薩所為誓者無有誓也師云一切人自然無有作者是為生死亦空道法亦空如空者無有從生死中來得佛者佛空法空故無有出滅諸法者一切人本空故亦無有造作衆生者也善業問焉知菩薩正升大乘師云大乘大道也何謂大乘何乘發住乘發何住孰建大乘斯乘何出佛言大乘之為乘者為無量乘為衆生之無量也菩薩法意廣大興載無量也所以者何人種無量菩薩為之生大悲意以斯大乘住奏三界聖一切知乃建大乘乘無從出所以者何有生有出則為二法若不起不致於諸法不得者是為無所生無從出善業曰大哉斯乘為天人質諒王諸世間出上善業乘與空等弘裕若空苞容衆生無有量數上善者普明也恆以虛間濟人無極而為遍宣故為大乘不見其反亦不見出佛常以虛心間暇無事群生來者不逆其志大士亦當學斯矣如此乘者不從始得不從終得亦不中得不從初知意得亦不從中間及終意得也於三塗等故為大乘佛言如是善業以能行此乘故謂之菩薩大士過去當來現在意等耳秋露子曰佛請賢者說明度無極而道大乘者有檀知耶師云佛本請卿令說明度無極耳而及說大乘事宜及知此耶秋露子為不知家問宜知是也善業白佛吾說明度無極得無過乎佛言不也適得其中善業言菩薩大士不於始近不於終近亦不中近不始意近道不終不近也無去來今三塗想矣色無際道無際痛想行識道俱無際是故菩薩無近無得無知無明色所以無邊無極者色之性本空故色菩薩不知不明不致不得痛想行識亦如是色與菩薩於是無有知想小無有明也了想不解意在其中無可得大智與明同義與得亦同義都一切於一切都一切謂菩薩心也於一切謂生死治法與道法也無知無明無致無得當為何菩薩說明度無極尚不見菩薩何用見明度無極菩薩者但名耳猶我為我無可專著我者空虛不可審明我不可明道何可知如是諸法無有專著何等為色色無生牢固何等為痛想行識識無生無牢固諸法無生無有牢固彼無專固者不是法不非了本無主當為說是處無知亦無異處可得菩薩行道也生死亦無處所也如是世尊其聞是言不驚不怛不捨不疲不有慘悴如此知行是菩薩為能惟明度無極所以者何行此經時以如是法孰觀斯道是時為不近色不近色者不見滅也所以者何於自然色而不起為非色若色費耗亦非色來無興衰我者此為無二事如為之色是我即由是為我色是為造計痛想行識如法觀時為不近識於自然識而不起為非識若識費耗亦非識來亦無興衰我者此為無二事如謂之識是我即由是為我識彼為造計者師云觀明度為不起色故言不近也秋露子曰吾省是語於義菩薩為無所起若無起者何故菩薩行艱難行為衆生更苦無量善業曰吾不樂菩薩艱難行而大士者無艱難想以行道也所以者何行艱難苦想者不能為無量人民建大利也師云此弟子行疲厭生死莫能導利一切人使得泥洹也是以當為安隱易行之想當為安隱不當為苦勞艱難想也為衆生建若母想父想昆弟想姊妹想子想女想當生是想行菩薩道於一切人為己親想以是想將導之行菩薩道者一切如視五親也但欲安隱導利非有癡貪戀之想見衆生為若己當念一切若己身都一切於身不明是外內菩薩都一切持心於一切天下不分別親者為內疏者為外矣也為生法想斯一切為吾子菩薩當度此無量苦性不有怒意法想者善權大悲也若被形截心無鬱毒終不為苦想也如賢者言菩薩無起以其無起故為菩薩秋露子曰云何菩薩而無起者於道人法於一切知一切知法亦持無起一切知法佛諸經法也善業曰然於佛法都無所起問曰在佛法而無起者其於凡人及凡人法亦將無起答曰然於凡人法亦無所起秋露子曰如是菩薩於道人法從一切智至凡人法皆無起者是為不近不起得一切智耶凡人法者謂生死法也皆無起者想寂然也近持將也起生者念也善業曰不起之法無欲得要也不起之念亦非有法不起之法無有望欲得之想也可擇取也有得佛者我以為諍無有二法當捨法善業曰諸法皆空無作無得今言此取是也有生死有得佛者斯謂以法意諍曰是如何當從未生法擇已生法乎擇取道也生死法至生法至乎生死之法至道乎當生有法至道乎問辭也答曰云何生法不生而不生法生耶善業欲解其難故先詰之言生死之法不起耶泥洹之法復生秋露子曰不生法者不起法也樂不起法之語耶樂起語也如賢者樂必不起之不要善業曰如是當樂不起不要賢者所樂吾亦樂說秋露子曰如善業為法都講最不可及所以者何在所問如應答法意不搖其言皆妙答曰是法意也佛諸弟子所問應答意不搖者於一切所猗故也善業於此清淨法中為都講秋露子於無比法中為都講秋露子曰善哉善哉是為上辨何謂菩薩諸法無猗答曰是明度無極即為菩薩諸法無猗意常清淨不在生死諸猗也曰不一切乘是經唯諸法無猗耶曰悉乘明度無極故為諸法無所猗問言不復諷誦承事行此此但當守一不猗生死而已耶菩薩於是無方石山處菩薩所行時雖坐方石不念此石安好可長坐也昔比丘披拘連樹下四十歲不知樹名者用無猗意在樹也而以默取諸法之要如無取焉是為行諸法而無猗行也默者定也以定意學諸要如無去就之想也若為菩薩說是奧知不疑不望而能深解是謂知行者已為不休如是念矣不疑不疑深法也不望不於道行之淨而污其意有所希望也不休其意於道無彈指之間廢息耳秋露子曰若不休此行為休是念若休是念為不休此如其念行而不休者是謂常行等念等也師云休止也等平等也若精進於此行者以為止生死念若止五陰斯為精進行法是也大士之行道與生死等生死與道等其法俱空故曰等也等行者不捨衆生疾取本淨也忍生死苦而以大道導利之令佛道不絶也已念等行等者則一切人必常有紹此行而得為開士者紹續也如是衆生亦將不休此念此行衆生亦得此法意也所以者何人不當廢是念也人不當休廢道念也善業曰善哉善哉賢者勸助為說是致要語如賢者言行等念等助一切人不廢此行夫衆生自然念亦自然當以知此衆生恢廓念恢廓當以知此衆生之不正覺而念不正覺行亦不正覺當以知此如是行念吾樂菩薩思惟念此行衆生靈空恢廓廣大無邊故可導利升此大道一切人不能正覺當以正覺開寤之也
